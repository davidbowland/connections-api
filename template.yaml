AWSTemplateFormatVersion: 2010-09-09
Description: >-
  API for connections project

Transform:
  - AWS::Serverless-2016-10-31

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - prod
      - test
    Description: Environment for deploy

Mappings:
  EnvironmentMap:
    prod:
      certificate: adce1a21-90b4-4120-8548-111215e582f0
      corsDomain: https://connections.dbowland.com
      createGameTimeout: 900
      domain: connections-api.dbowland.com
      gamesTable: connections-api-games
      logStreamFunction: log-subscriber
      maxGameGenerationAttempts: 3
      project: connections
      promptsTable: connections-api-prompts
      rerollPasswordPath: /connections-api/reroll-password
      scheduledGameCreationEnabled: true
      zoneId: Z072422417XWM8PIXXSFA
    test:
      certificate: 6a48cba7-feb9-4de5-8cbf-d383140fcdef
      corsDomain: https://connections.bowland.link
      createGameTimeout: 900
      domain: connections-api.bowland.link
      gamesTable: connections-api-games-test
      logStreamFunction: log-subscriber-test
      maxGameGenerationAttempts: 1
      project: connections-test
      promptsTable: connections-api-prompts-test
      rerollPasswordPath: /connections-api-test/reroll-password
      scheduledGameCreationEnabled: false
      zoneId: Z01312547RGU1BYKIJXY

Resources:
  # API Gateway

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowCredentials: true
        AllowHeaders:
          - Authorization
          - Content-Type
          - X-Amz-Date
          - X-Amz-Security-Token
          - X-Api-Key
          - X-Twitch-Token
        AllowMethods:
          - GET
          - OPTIONS
          - POST
        AllowOrigins:
          - !FindInMap [EnvironmentMap, !Ref Environment, corsDomain]
      Domain:
        BasePath:
          - /v1
        CertificateArn: !Sub
          - 'arn:aws:acm:${AWS::Region}:${AWS::AccountId}:certificate/${Certificate}'
          - Certificate: !FindInMap [EnvironmentMap, !Ref Environment, certificate]
        DomainName: !FindInMap [EnvironmentMap, !Ref Environment, domain]
        EndpointConfiguration: REGIONAL
        Route53:
          DistributionDomainName: !FindInMap [EnvironmentMap, !Ref Environment, domain]
          HostedZoneId: !FindInMap [EnvironmentMap, !Ref Environment, zoneId]
      FailOnWarnings: true
      StageName: v1

  # Games

  GetGameIdsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-game-ids.getGameIdsHandler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 1536
      Description: Retrieve all valid game IDs
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          DEBUG_LOGGING: 'false'
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /games
            Method: get
      Tags:
        'created-by': 'connections-api'
        'created-for': 'connections'
        'environment': !Ref Environment
      Timeout: 15
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-game-ids.ts

  GetGameIdsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetGameIdsFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'connections-api'
        - Key: 'created-for'
          Value: 'connections'
        - Key: 'environment'
          Value: !Ref Environment

  GetGameIdsGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetGameIdsLogGroup

  GetGameByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-game-by-id.getGameByIdHandler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 1536
      Description: Retrieve a game by ID, creating it if necessary
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref GamesTable
        - Version: 2012-10-17
          Statement:
            - Action:
                - 'lambda:InvokeFunction'
              Effect: Allow
              Resource: !GetAtt CreateGameFunction.Arn
      Environment:
        Variables:
          DEBUG_LOGGING: 'false'
          CREATE_GAME_FUNCTION_NAME: !Ref CreateGameFunction
          DYNAMODB_GAMES_TABLE_NAME: !Ref GamesTable
          GAME_GENERATION_TIMEOUT: !FindInMap [EnvironmentMap, !Ref Environment, createGameTimeout]
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /games/{gameId}
            Method: get
      Tags:
        'created-by': 'connections-api'
        'created-for': 'connections'
        'environment': !Ref Environment
      Timeout: 15
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-game-by-id.ts

  GetGameByIdLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetGameByIdFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'connections-api'
        - Key: 'created-for'
          Value: 'connections'
        - Key: 'environment'
          Value: !Ref Environment

  GetGameByIdGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetGameByIdLogGroup

  # Scheduled Game Creation

  CreateGameFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/create-game.createGameHandler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 1536
      Description: Create daily connections game
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref GamesTable
        - DynamoDBReadPolicy:
            TableName: !Ref PromptsTable
        # Allow invoking a model in Bedrock
        - Version: 2012-10-17
          Statement:
            - Action:
                - 'aws-marketplace:ViewSubscriptions'
                - 'aws-marketplace:Subscribe'
                - 'bedrock:InvokeModel*'
              Effect: Allow
              Resource: '*'
        - Version: 2012-10-17
          Statement:
            - Action:
                - 'lambda:InvokeFunction'
              Effect: Allow
              Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-CreateGameFunction-*'
      Environment:
        Variables:
          AVOID_NEXT_GAMES_COUNT: 10
          AVOID_PAST_GAMES_COUNT: 20
          DEBUG_LOGGING: 'false'
          DYNAMODB_GAMES_TABLE_NAME: !Ref GamesTable
          DYNAMODB_PROMPTS_TABLE_NAME: !Ref PromptsTable
          GAME_GENERATION_TIMEOUT: !FindInMap [EnvironmentMap, !Ref Environment, createGameTimeout]
          INSPIRATION_ADJECTIVES_COUNT: 5
          INSPIRATION_NOUNS_COUNT: 10
          INSPIRATION_VERBS_COUNT: 8
          LLM_PROMPT_ID: create-connections-game
          LLM_VERIFY_PROMPT_ID: verify-connections-game
          MAX_GAME_GENERATION_ATTEMPTS:
            !FindInMap [EnvironmentMap, !Ref Environment, maxGameGenerationAttempts]
          WORD_CONSTRAINT_CHANCE: 0.12
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: 'cron(33 3 ? * * *)'
            Description: Create daily game between 3-4am UTC (UTC+14 is max)
            Enabled: !FindInMap [EnvironmentMap, !Ref Environment, scheduledGameCreationEnabled]
      Tags:
        'created-by': 'connections-api'
        'created-for': 'connections'
        'environment': !Ref Environment
      Timeout: !FindInMap [EnvironmentMap, !Ref Environment, createGameTimeout]
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/create-game.ts

  CreateGameLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${CreateGameFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'connections-api'
        - Key: 'created-for'
          Value: 'connections'
        - Key: 'environment'
          Value: !Ref Environment

  CreateGameGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref CreateGameLogGroup

  # Reroll Game

  # One-time setup — run this to create the SSM parameter before deploying:
  # Prod:
  # aws ssm put-parameter \
  #   --name /connections-api/reroll-password \
  #   --value "your-password-here" \
  #   --type SecureString
  # Test:
  # aws ssm put-parameter \
  #   --name /connections-api-test/reroll-password \
  #   --value "your-password-here" \
  #   --type SecureString
  # Note: uses the AWS-managed SSM key (aws/ssm). If you switch to a CMK,
  # add kms:Decrypt on the key ARN to the RerollGameFunction IAM policy.

  RerollGameFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/reroll-game.rerollGameHandler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 1536
      Description: Delete and regenerate a connections game by date
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            - Action:
                - 'dynamodb:DeleteItem'
              Effect: Allow
              Resource: !GetAtt GamesTable.Arn
            - Action:
                - 'lambda:InvokeFunction'
              Effect: Allow
              Resource: !GetAtt CreateGameFunction.Arn
            - Action:
                - 'ssm:GetParameter'
              Effect: Allow
              Resource: !Sub
                - 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${RerollPasswordPath}'
                - RerollPasswordPath:
                    !FindInMap [EnvironmentMap, !Ref Environment, rerollPasswordPath]
      Environment:
        Variables:
          CREATE_GAME_FUNCTION_NAME: !Ref CreateGameFunction
          DEBUG_LOGGING: 'false'
          DYNAMODB_GAMES_TABLE_NAME: !Ref GamesTable
          SSM_REROLL_PASSWORD_PATH:
            !FindInMap [EnvironmentMap, !Ref Environment, rerollPasswordPath]
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /games/{gameId}/reroll
            Method: post
      Tags:
        'created-by': 'connections-api'
        'created-for': 'connections'
        'environment': !Ref Environment
      Timeout: 15
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/reroll-game.ts

  RerollGameLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${RerollGameFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'connections-api'
        - Key: 'created-for'
          Value: 'connections'
        - Key: 'environment'
          Value: !Ref Environment

  RerollGameGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref RerollGameLogGroup

  # DynamoDB

  GamesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: GameId
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: GameId
          KeyType: HASH
      TableName: !FindInMap [EnvironmentMap, !Ref Environment, gamesTable]
      Tags:
        - Key: 'created-by'
          Value: 'connections-api'
        - Key: 'created-for'
          Value: 'connections'
        - Key: 'environment'
          Value: !Ref Environment

  PromptsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: PromptId
          AttributeType: S
        - AttributeName: UpdatedAt
          AttributeType: N
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: PromptId
          KeyType: HASH
        - AttributeName: UpdatedAt
          KeyType: RANGE
      TableName: !FindInMap [EnvironmentMap, !Ref Environment, promptsTable]
      Tags:
        - Key: 'created-by'
          Value: 'connections-api'
        - Key: 'created-for'
          Value: 'connections'
        - Key: 'environment'
          Value: !Ref Environment
